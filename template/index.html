<!DOCTYPE html>
<html>
<head>
    <title>{{ channel_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>

<div class="container">

    <h1>{{ channel_name }}</h1>
    <p>{{ description }}</p>
    <p><b>Author:</b> {{ author }}</p>
    
    <hr>

    <h2>Add Note</h2>
    <form action="/add" method="post">
        <input type="text" name="note" placeholder="Enter note..." required>
        <button type="submit">Save</button>
    </form>

    <h2>Stored Notes</h2>
    
    <ul>
        {% for note in notes %}
            <li>{{ note.content }}</li>
        {% endfor %}
    </ul>
    
    <div class="footer">
        🚀 Built with FastAPI + PostgreSQL + Docker  
        | DevOps Rajendra Channel
    </div>

</div>

</body>
</html>
