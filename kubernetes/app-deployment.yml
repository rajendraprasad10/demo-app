# app secretes 
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: django-prod
type: Opaque
stringData:
  DATABASE_URL: postgresql://postgres:postgres@postgres-service:5432/devopsdb

---   
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: django-prod
data:
  DB_HOST: postgres-service
  DB_PORT: "5432"
  DB_NAME: devopsdb



---
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-secret
  namespace: django-prod
type: Opaque
data:
  DB_USER: cG9zdGdyZXM=      # postgres
  DB_PASSWORD: cG9zdGdyZXM=  # postgres


# app deployment 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app
  namespace: django-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi-app
  template:
    metadata:
      labels:
        app: fastapi-app
    spec:
      # 🔥 Wait for DB
      initContainers:
        - name: wait-for-postgres
          image: postgres:15
          command:
            - sh
            - -c
            - |
              echo "Checking PostgreSQL readiness..."

              until pg_isready -h postgres-service -p 5432 -U postgres; do
                echo "Postgres not ready yet..."
                sleep 2
              done

              echo "Postgres is READY ✅"
      
      # application container config
      containers:
        - name: fastapi-container
          image: 906353/app2:v2.0.1   # use built image
          ports:
            - containerPort: 8000
          
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: fastapi-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: fastapi-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: fastapi-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: fastapi-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fastapi-secret
                  key: DB_PASSWORD
          # ADD THIS
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Readiness Probe (when app is ready to serve traffic)
          readinessProbe:
            httpGet:
              path: /health        # change if you have custom health endpoint
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          #  Liveness Probe (restart if app is stuck)
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

# HPA 
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-hpa
  namespace: django-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi-app

  minReplicas: 1
  maxReplicas: 5

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # scale when CPU > 70%

              

# app service  
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  namespace: django-prod
spec:
  type: NodePort
  selector:
    app: fastapi-app
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080

                
